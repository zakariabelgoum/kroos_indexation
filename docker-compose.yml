services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kroos
      POSTGRES_USER: kroos
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kroos"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  indexer:
    build: .
    command: ["python", "main.py", "watch"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kroos:secret@postgres:5432/kroos
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
